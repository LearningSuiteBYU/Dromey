<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Flash via Ruffle CDN</title>
  <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
  <style>
  body {
    margin: 0;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .swf-container {
    width: 90%;              /* small screens */
    max-width: 1200px;       /* limit max growth */
    aspect-ratio: 4 / 3;     /* change if your SWF is 16/9 */
    background: black;
  }

  .swf-container > * {
    width: 100% !important;
    height: 100% !important;
    display: block;
  }

  /* Larger screens */
  @media (min-width: 1024px) {
    .swf-container {
      width: 70%;
    }
  }
</style>
</head>
<body>
  <div id="player"></div>

  <script>
    const ruffle = window.RufflePlayer.newest();
    const player = ruffle.createPlayer();
    
    document.getElementById("player").appendChild(player);
    player.load("assets/vocal_sound_source.swf");
  </script>
</body>
</html>
