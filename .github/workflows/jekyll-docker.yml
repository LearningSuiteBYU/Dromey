# Minimal skeleton for artifact flow (only if Pages enabled)
permissions:
  pages: write
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: | 
          # build or copy into public
          rm -rf public || true
          mkdir public
          cp -r vocal_sound_source/* public/
      - uses: actions/configure-pages@v4
        with:
          enablement: all
      - uses: actions/upload-pages-artifact@v1    # use the Pages artifact action version recommended in docs
        with:
          path: public
      - uses: actions/deploy-pages@v4
