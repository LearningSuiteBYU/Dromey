name: Deploy Static Site to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    # <-- THIS IS THE CRITICAL LINE the deploy action expects
    environment:
      name: github-pages

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: List repo (debug)
        run: ls -la

      - name: Prepare public directory
        run: |
          set -euo pipefail
          rm -rf public || true
          mkdir public
          # copy your site root (or assets contents) into public
          if [ -d "assets" ]; then
            cp -r assets/* public/
          else
            cp -r ./* public/ || true
          fi
          echo "public contents:"
          ls -la public

      - name: Configure Pages
        uses: actions/configure-pages@v4
        # If your org requires explicit enablement, you can add: with: enablement: all

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v1
        with:
          path: public

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
