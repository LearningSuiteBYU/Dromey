name: Deploy static site to gh-pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write   # allow pushing the gh-pages branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare public directory
        run: |
          set -euo pipefail
          rm -rf public || true
          mkdir -p public

          # If you keep the site under assets/, copy its contents
          if [ -d "assets" ]; then
            cp -r assets/* public/
          else
            # otherwise copy top-level files (exclude .git and .github)
            shopt -s dotglob nullglob
            for item in ./*; do
              name=$(basename "$item")
              if [[ "$name" == ".git" || "$name" == ".github" || "$name" == "public" ]]; then
                continue
              fi
              cp -r "$item" public/
            done
          fi

          echo "public contents:"
          ls -la public

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          # optional:
          # commit_message: "Deploy site: ${{ github.sha }}"
